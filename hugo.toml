baseURL = "https://vanvj00001.github.io/oldvan/"
languageCode = "zh-cn"
title = "老梵"
theme = "PaperMod"
paginate = 8

[params]
  mainSections = ["posts"]
  disableSpecial1stPost = true
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.author]
    name = "老梵"

[params.homeInfoParams]
  Title = ""
  Content = """
**《空中小屋小引》**

有客自远方来，幸会幸会。
老梵结庐云端，名曰“空中小屋”。邀君共坐，瀹茗焚檀，且话浮生。
此间无俗物，但有清风明月，一炷心香。
每旬易稿，周有新篇，皆为静观世事、咀嚼人生之作。
君若得暇，不妨驻足，同参造化，共悟天机。
一盏茶凉，三千界破，个中真意，惟心知耳。
"""

