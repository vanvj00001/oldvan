baseURL = "https://oldvan.top/"
languageCode = "zh-cn"
title = "老梵"
theme = "PaperMod"
paginate = 8
hasCJKLanguage = true
defaultContentLanguage = "zh-cn"
disablePathToLower = true

[params]
  mainSections = ["posts"]
  disableSpecial1stPost = true
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.pageViews]
    enabled = true
    label = "阅读量"
    namespace = "oldvan-top"
    endpoint = "https://oldvan-page-views.vanvjvanvj.workers.dev"

  [params.comments]
    enabled = true
    provider = "giscus"

    [params.comments.giscus]
      repo = "vanvj00001/oldvan"
      repoID = "R_kgDORe3TgA"
      category = "General"
      categoryID = "DIC_kwDORe3TgM4C4_S_"
      mapping = "pathname"
      strict = "0"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "bottom"
      theme = "preferred_color_scheme"
      lang = "zh-CN"

  [params.author]
    name = "老梵"

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 10

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
